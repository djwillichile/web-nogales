name: Deploy static viewer to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Cache generated COGs
        id: cache-cogs
        uses: actions/cache@v4
        with:
          path: assets/data/cogs
          key: cogs-${{ hashFiles('scripts/build_worldclim_cogs.py') }}
          restore-keys: |
            cogs-

      - name: Cache generated admin boundaries
        id: cache-admin
        uses: actions/cache@v4
        with:
          path: |
            assets/data/regiones.geojson
            assets/data/comunas.geojson
          key: admin-${{ hashFiles('scripts/build_admin_boundaries.py') }}

      - name: Install Python dependencies
        if: steps.cache-cogs.outputs.cache-hit != 'true' || steps.cache-admin.outputs.cache-hit != 'true'
        run: pip install -r scripts/requirements.txt

      - name: Build COGs (skip on cache hit)
        if: steps.cache-cogs.outputs.cache-hit != 'true'
        run: python scripts/build_worldclim_cogs.py

      - name: Build admin boundaries (skip on cache hit)
        if: steps.cache-admin.outputs.cache-hit != 'true'
        run: python scripts/build_admin_boundaries.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        run: |
          mkdir -p dist
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            ./ dist/
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
