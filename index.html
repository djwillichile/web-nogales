<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visor Agroclimático Nogal | Chile centro-sur</title>
    <meta
      name="description"
      content="Visualizador web interactivo de capas climáticas y agroclimáticas para nogal en Chile centro-sur. Deploy: https://djwillichile.github.io/web-nogales/"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQpRByh6k4+hxc0O9eZz9q6Jg7LkR/g="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main id="app-shell" aria-label="Visor agroclimático para nogal">
      <div id="map" role="application" aria-label="Mapa interactivo agroclimático"></div>

      <aside class="card-stack" aria-label="Controles de capa">
        <div class="card card--select">
          <label class="sr-only" for="variableSelect">Variable agroclimática</label>
          <select id="variableSelect" class="card-select">
            <option value="precipitacion">Precipitación mensual</option>
            <option value="temp_min">Temperatura mínima media</option>
            <option value="temp_media">Temperatura media</option>
            <option value="temp_max">Temperatura máxima media</option>
            <option value="aptitud_nogal">Aptitud de nogal</option>
          </select>
        </div>

        <div class="card card--select">
          <label class="sr-only" for="scenarioSelect">Año o escenario climático</label>
          <select id="scenarioSelect" class="card-select">
            <option value="baseline">Línea base</option>
            <option value="2030">2030</option>
            <option value="2050" selected>2050</option>
            <option value="2070">2070</option>
          </select>
        </div>

        <div class="card card--select">
          <label class="sr-only" for="monthSelect">Mes</label>
          <select id="monthSelect" class="card-select">
            <option value="0">Mes de enero</option>
            <option value="1">Mes de febrero</option>
            <option value="2" selected>Mes de marzo</option>
            <option value="3">Mes de abril</option>
            <option value="4">Mes de mayo</option>
            <option value="5">Mes de junio</option>
            <option value="6">Mes de julio</option>
            <option value="7">Mes de agosto</option>
            <option value="8">Mes de septiembre</option>
            <option value="9">Mes de octubre</option>
            <option value="10">Mes de noviembre</option>
            <option value="11">Mes de diciembre</option>
          </select>
        </div>

        <div class="card card--opacity">
          <label class="card-title" for="opacityRange">
            Opacidad de la capa
          </label>
          <input id="opacityRange" type="range" min="20" max="90" value="64" />
          <label class="card-checkbox">
            <input id="smoothToggle" type="checkbox" checked />
            Suavizar raster continuo
          </label>
        </div>

        <div id="adminCard" class="card card--admin" hidden>
          <strong class="card-title">Límites Administrativos</strong>
          <label class="swatch-row">
            <input id="regionesToggle" type="checkbox" checked />
            <span class="line-swatch line-swatch--region" aria-hidden="true"></span>
            Regiones
          </label>
          <label class="swatch-row">
            <input id="comunasToggle" type="checkbox" checked />
            <span class="line-swatch line-swatch--commune" aria-hidden="true"></span>
            Comunas
          </label>
        </div>
      </aside>

      <input type="hidden" id="adminToggle" checked />

      <div id="searchOverlay" class="search-overlay" hidden>
        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="Buscar comuna, dirección o lugar…"
          autocomplete="off"
        />
        <ul id="searchResults" class="search-results" role="listbox"></ul>
        <p class="search-attribution">Búsqueda powered by OpenStreetMap Nominatim.</p>
      </div>

      <section id="legend" class="legend-bar" aria-label="Leyenda de colores"></section>

      <div id="climographModal" class="modal" hidden>
        <div class="modal-backdrop" data-close></div>
        <div class="modal-card" role="dialog" aria-labelledby="climographTitle" aria-modal="true">
          <header class="modal-header">
            <h2 id="climographTitle">Diagrama hombrotérmico</h2>
            <button type="button" class="modal-close" aria-label="Cerrar" data-close>&times;</button>
          </header>
          <p id="climographSubtitle" class="modal-subtitle"></p>
          <div id="climographStatus" class="modal-status">Cargando datos…</div>
          <div class="modal-canvas-wrap">
            <canvas id="climographCanvas" width="640" height="320"></canvas>
          </div>
          <p class="modal-footer-note">Walter-Lieth · WorldClim 2.1 / CMIP6 ACCESS-CM2 SSP245.</p>
        </div>
      </div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://unpkg.com/georaster@1.6.0/dist/georaster.browser.bundle.min.js"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet@3.10.0/dist/georaster-layer-for-leaflet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
